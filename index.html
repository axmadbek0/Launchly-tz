<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="DevStack - Modern Task Management Platform for Developers">
    <meta name="theme-color" content="#00f5d4">
    <title>Launchly - Master Your Workflow</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>
    <header>
        <span class="logo">Launchly</span>
        <button onclick="theme()" id="themeBtn">🌙</button>
    </header>
    <!-- website navigatsiyasi -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-icon">◈</span>
            <span class="logo-text">Launchly</span>
        </div>
        <a href="tz.html" class="btn-primary">Enter Launchly</a>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                Master Your<br>
                <span class="gradient-text">Workflow</span>
            </h1>
            <p class="hero-subtitle">
                The intelligent task management platform built specifically for every person.
                Plan sprints, track bugs, and ship faster.
            </p>
            <a href="tz.html" class="btn-main">
                Enter Launchly
                <span class="arrow">→</span>
            </a>
        </div>
        <div class="hero-visual">
            <div class="dashboard-mockup">
                <div class="mockup-header">
                    <div class="dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="mockup-title">Launchly Dashboard</div>
                </div>
                <div class="mockup-content">
                    <div class="sidebar">
                        <div class="nav-item active">📋 Tasks</div>
                    </div>
                    <div class="main-area">
                        <div class="task-card">
                            <div class="task-title">Sleep 23:00</div>
                        </div>
                        <div class="task-card">
                            <div class="task-title"> Java script homework</div>
                        </div>
                        <div class="task-card completed">
                            <div class="task-title"> Read a book (JavaScript)</div>
                        </div>
                    </div>                
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
