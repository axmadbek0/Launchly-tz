<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchly - Master Your Workflow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        <span>Orqaga</span>
    </button>
    <div class="wrap">
        <header>
            <span class="logo">Launchly</span>
            <button onclick="theme()" id="themeBtn">🌙</button>
        </header>

        <div class="add">
            <input type="text" id="in" placeholder="Task to add..." autocomplete="off">
            <button onclick="add()">+</button>
        </div>

        <div class="search-box">
            <input type="text" id="se" placeholder="Search..." oninput="search(this.value)" autocomplete="off">
        </div>

        <div class="filters">
            <button class="a" onclick="filter('all')">Everythings</button>
            <button onclick="filter('done')">Done</button>
            <button onclick="filter('undone')">Undone</button>
        </div>

        <div id="list"></div>
    </div>

    <div class="modal" id="mod" onclick="closeEdit(event)">
        <div class="box" onclick="event.stopPropagation()">
            <h3>Edit Task</h3>
            <input type="text" id="ed" autocomplete="off">
            <div class="btns">
                <button onclick="closeEdit()">Cancel</button>
                <button onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
